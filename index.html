<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-ive Snake</title>

    <link rel="icon" href="data:,">

    <!-- React & ReactDOM CDN -->
    <!-- No sé por qué no me reconoce reactdom 19, le puse react 18  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (to use JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <style>
    </style>
    <div id="root"></div>
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'))

        const Point = ({ x, y }) => {
            const style = {
                backgroundColor: "green",
                width: "100%",
                height: "100%",
                gridColumn: x,
                gridRow: y
            }
            
            return( <div style={style}></div> )
        }


        
        const Game = () => {
            const [snake, updateSnake] = React.useState(
                [{ x:4, y:5 },
                { x:3, y:5 },
                { x:2, y:5 }])
            const [direction, setDirection] = React.useState('ArrowRight')
            
            const size = 15;
            const pixels = 40;
            const boardStyle =  {
                display: "grid",
                gridTemplateColumns: `repeat(${size}, ${pixels}px)`,
                gridTemplateRows: `repeat(${size}, ${pixels}px)`
            }
            
            React.useEffect(
                () => {
                    const handleDirection = (k) => {
                        if (k.key === 'ArrowRight' && direction != 'ArrowLeft'){
                            setDirection('ArrowRight')
                        } else if (k.key === 'ArrowLeft' && direction != 'ArrowRight'){
                            setDirection('ArrowLeft')
                        } else if (k.key === 'ArrowUp' && direction != 'ArrowDown'){
                            setDirection('ArrowUp')
                        } else if (k.key === 'ArrowDown' && direction != 'ArrowUp'){
                            setDirection('ArrowDown')
                        }
                    }

                    window.addEventListener("keydown", handleDirection)
                    return () => window.removeEventListener("keydown", handleDirection)
            }, [direction])

            React.useEffect(
                () => {
                    const i = setInterval(
                        () => {
                            updateSnake( (oldSnake) => {
                                    const [head, ...body] = oldSnake 
                                    /*
                                        Funcion vieja, la dejo aca por si rompo algo

                                    let newHead = { x: null, y: null }
                                    switch(direction) {
                                        case 'ArrowRight':
                                             newHead = { x: oldPos.x + 1, y: oldPos.y }
                                             break
                                        case 'ArrowLeft':
                                            newHead =  { x: oldPos.x - 1, y: oldPos.y }
                                            break
                                        case 'ArrowDown':
                                            newHead =  { x: oldPos.x, y: oldPos.y + 1}
                                            break
                                        case 'ArrowUp':
                                            newHead =  { x: oldPos.x, y: oldPos.y - 1}
                                            break

                                        newHead.x = ....
                                        newHead.y = ....
                                    }
                                    */

                                    const newHead = (direction === 'ArrowRight') ? { x: (head.x + size-1 + 1) % size + 1, y: (head.y + size-1) % size + 1 }: 
                                                    (direction === 'ArrowLeft' ) ? { x: (head.x + size-1 - 1) % size + 1, y: (head.y + size-1) % size + 1 }:
                                                    (direction === 'ArrowDown' ) ? { x: (head.x + size-1) % size + 1, y: (head.y + size-1 + 1) % size + 1 }:
                                                                                   { x: (head.x + size-1) % size + 1, y: (head.y + size-1 - 1) % size + 1 }

                                    return [newHead, ...oldSnake.slice(0,-1)]
                                }
                            )
                        }, 400)

                    return () => clearInterval(i)
                }, [direction]) 

            return(
                <main className="board" style={boardStyle}>
                    {snake.map((obj) => { return(<Point x={obj.x} y={obj.y}/>) })}
                </main>)
        }

        root.render(<Game/>)

    </script>
</body>
</html>
