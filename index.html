<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-ive Snake</title>

    <link rel="icon" href="data:,">

    <!-- React & ReactDOM CDN -->
    <!-- No sé por qué no me reconoce reactdom 19, le puse react 18  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (to use JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <style>
        * { 
            font-family: 'Tahoma';
            margin: 0px;
            padding: 0px;
        }
        .parent {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #20102b;
        }

        h1 {
            color: #d2e1fa;
            font-size: 80px;
            margin-top: -80px;
            text-shadow: 0 0 5px rgba(0,0,0, 0.5);
        }
        
        h2 {
            color: #02a7d9;
            font-size: 35px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        p {
            color: #d2e1fa;
            font-size: 30px;
            margin-top: 20px;
            padding-bottom: 100px;
        }   
    </style>
    <div id="root"></div>
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'))
        const size = 15;
        const pixels = 40;

        const Point = ({ x, y }) => {
            const style = {
                backgroundColor: "blue",
                width: "100%",
                height: "100%",
                gridColumn: x,
                gridRow: y
            }
            
            return( <div style={style}></div> )
        }

        const Food = ({ x, y }) => {
            const style = {
                width: "100%",
                height: "100%",
                objectFit: "fill",
                gridColumn: x,
                gridRow: y
            }
            return( <img src="./assets/apple.png" style={style}/> )
        }

        const Score = ({ points }) => {
            return( <h2>Current high score: {points}</h2> )
        }

        const Board = ({ children }) => {
            const boardStyle =  {
                display: "grid",
                border: '8px solid #4797ff',
                backgroundImage: 'url("./assets/grass.jpg")',
                borderRadius: '10px',
                gridTemplateColumns: `repeat(${size}, ${pixels}px)`,
                gridTemplateRows: `repeat(${size}, ${pixels}px)`,
                width: `${size*pixels}px`,
                height: `${size*pixels}px`
            }

            return (<main className='board' style={boardStyle}>{children}</main>)
        }
        
        const Game = () => {
            const [snake, updateSnake] = React.useState(
                [{ x:4, y:5 },
                { x:3, y:5 },
                { x:2, y:5 }])
            const [direction, setDirection] = React.useState('ArrowRight')
            const [highScore, setHighScore] = React.useState(0)
            const [food, updateFood] = React.useState(
                [{ x:6, y:5 }])

            const removeFood = (rX, rY, sX, sY) => {
                const temp = [...food]
                for (let i = 0; i < temp.length; i++){
                    if (temp[i].x === rX && temp[i].y === rY){
                        temp[i] = { x: sX, y: sY }
                    }
                }
                return temp
            }
            
           /*
           si funciona esto pero es muy ineficiente creo

           let arenaMat = [];
            for (let i = 0; i < size; i++){
                arenaMat[i] = [];
                for (let j = 0; j < size; j++){
                    arenaMat[i][j] = 0;
                }
            }

            const setMat = (x, y, val) => {
                const newMat = arenaMat.map(row => [...row])
                newMat[x][y] = val
                return newMat
            }

            const [arena, updateArena] = React.useState(arenaMat)
            */

            // const [emptySpaces, setEmptySpaces] = React.useState([])

            /*
            const reassignSpace = (x,y,val) => {
                return [...emptySpaces][x].splice(y,0,val)
            }
            */

            React.useEffect(
                () => {
                    const handleDirection = (k) => {
                        if (k.key === 'ArrowRight' && direction != 'ArrowLeft'){
                            setDirection('ArrowRight')
                        } else if (k.key === 'ArrowLeft' && direction != 'ArrowRight'){
                            setDirection('ArrowLeft')
                        } else if (k.key === 'ArrowUp' && direction != 'ArrowDown'){
                            setDirection('ArrowUp')
                        } else if (k.key === 'ArrowDown' && direction != 'ArrowUp'){
                            setDirection('ArrowDown')
                        }
                    }

                    window.addEventListener("keydown", handleDirection)
                    return () => window.removeEventListener("keydown", handleDirection)
            }, [direction])

            React.useEffect(
                () => {
                    const i = setInterval(
                        () => {
                            updateSnake( (oldSnake) => {
                                    const [head, ...body] = oldSnake 

                                    const newHead = (direction === 'ArrowRight') ? { x: (head.x + size-1 + 1) % size + 1, y: (head.y + size-1) % size + 1 }: 
                                                    (direction === 'ArrowLeft' ) ? { x: (head.x + size-1 - 1) % size + 1, y: (head.y + size-1) % size + 1 }:
                                                    (direction === 'ArrowDown' ) ? { x: (head.x + size-1) % size + 1, y: (head.y + size-1 + 1) % size + 1 }:
                                                                                   { x: (head.x + size-1) % size + 1, y: (head.y + size-1 - 1) % size + 1 }
                                    
                                    let emptySpaces = []
                                    for (let i = 0; i < size; i++) {
                                        emptySpaces[i] = []
                                        for (let j = 0; j < size; j++) {
                                            emptySpaces[i][j] = { x:i+1, y:j+1 }
                                        }
                                    }

                                   emptySpaces = emptySpaces.filter( (obj) => {
                                        for (const f of food) {
                                            if (f.x === obj.x && f.y === obj.y) { return false }
                                        }
                                        for (const s of oldSnake) {
                                            if (s.x === obj.x && s.y === obj.y) { return false }
                                        }
                                        return true
                                    })

                                    const newSnake = [newHead, ...oldSnake.slice(0,-1)]

                                    for (const f of food) {
                                        if (f.x === newHead.x && f.y === newHead.y) {
                                            newSnake.push(newHead)
                                            setHighScore(curr => curr+1)
                                            const randNum = Math.floor(Math.random() * emptySpaces.length)
                                            const randSpot = emptySpaces[randNum][randNum]
                                            updateFood(removeFood(f.x,f.y,randSpot.x,randSpot.y))
                                        }
                                    }

                                    return newSnake 
                                }
                            )
                        }, 400)

                    return () => clearInterval(i)
                }, [direction]) 

            return(
                <div className="parent">
                    <h1>React-ive Snake</h1>
                    <Score points={highScore}/>
                    <p> Press the button below to begin your very own experience of the great Snake game made in React </p>
                    <Board>
                        {food.map((obj, i) => { return(<Food key={i} x={obj.x} y={obj.y}/>) })}
                        {snake.map((obj, i) => { return(<Point key={i} x={obj.x} y={obj.y}/>) })}
                    </Board>
                </div>
            )
        }

        root.render(<Game/>)

    </script>
</body>
</html>
