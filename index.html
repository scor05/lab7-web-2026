<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-ive Snake</title>

    <link rel="icon" href="data:,">

    <!-- React & ReactDOM CDN -->
    <!-- No sé por qué no me reconoce reactdom 19, le puse react 18  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (to use JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <style>
        * { 
            font-family: 'Tahoma';
            margin: 0px;
            padding: 0px;
        }
        .parent {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #20102b;
        }

        h1 {
            color: #d2e1fa;
            font-size: 80px;
            margin-top: -40px;
            text-shadow: 0 0 5px rgba(0,0,0, 0.8);
        }

        button {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            border: 0px;
            font-size: 35px;
            width: 250px;
            height: 75px;
            margin-top: -70px;
            margin-bottom: 30px;
        }

        .pause { 
            background-color: #d2e1fa;
            color: #4797ff;
        }

        .start, .resume {
            background-color: #4797ff;
            color: #d2e1fa;
        }

        #mainArea {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        h2 {
            color: #02a7d9;
            font-size: 35px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        p {
            color: #d2e1fa;
            font-size: 30px;
            margin-top: 20px;
            padding-bottom: 100px;
            text-align: center;
        }   
    </style>
    <div id="root"></div>
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'))
        const size = 15;
        const pixels = 40;

        const Point = ({ x, y }) => {
            const style = {
                backgroundColor: "blue",
                width: "100%",
                height: "100%",
                gridColumn: x,
                gridRow: y
            }
            
            return( <div style={style}></div> )
        }

        const Food = ({ x, y }) => {
            const style = {
                width: "100%",
                height: "100%",
                objectFit: "fill",
                gridColumn: x,
                gridRow: y
            }
            return( <img src="./assets/apple.png" style={style}/> )
        }

        const Score = ({ points }) => {
            return( <h2>Current high score: {points}</h2> )
        }

        const PauseScreen = () => {
            const style = {
                display: "flex",
                border: "8px solid #4797ff",
                backgroundImage: 'url("./assets/pause.jpg")',
                backgroundSize: "cover",
                backgroundPosition: "center",
                borderRadius: "20px",
                width: `${size*pixels}px`,
                height: `${size*pixels}px`
            }

            return (<main className='pause' style={style}/>)
        }

        const DeathScreen = () => {
            const style = {
                display: "flex",
                border: "8px solid #4797ff",
                backgroundImage: 'url("./assets/deathScreen.webp")',
                backgroundSize: "cover",
                backgroundPosition: "center",
                borderRadius: "20px",
                width: `${size*pixels}px`,
                height: `${size*pixels}px`
            }

            return (<main className='death' style={style}/>)
        }


        const Board = ({ children }) => {
            const boardStyle =  {
                display: "grid",
                border: '8px solid #4797ff',
                backgroundImage: 'url("./assets/grass.jpg")',
                borderRadius: '20px',
                gridTemplateColumns: `repeat(${size}, ${pixels}px)`,
                gridTemplateRows: `repeat(${size}, ${pixels}px)`,
                width: `${size*pixels}px`,
                height: `${size*pixels}px`
            }

            return (<main className='board' style={boardStyle}>{children}</main>)
        }
        
        const Game = () => {
            const [snake, updateSnake] = React.useState([])
            const [food, updateFood] = React.useState([])
            const [emptySpaces, setEmptySpaces] = React.useState([])
            const [direction, setDirection] = React.useState('nil')
            const [prevDirection, setPrevDirection] = React.useState('nil')
            const [prevHighScore, setPrevHighScore] = React.useState(0)
            const [highScore, setHighScore] = React.useState(0)
            const [gameState, setGameState] = React.useState('InitialLoad')
            const [speed, setSpeed] = React.useState(400)

            const generateBoard = () => {
                updateSnake([{x:4, y:5}, {x:3, y:5}, {x:2,y:5}])

                let boardSpaces = []
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        boardSpaces.push({ x:i+1, y:j+1 })
                    }
                }

                boardSpaces = boardSpaces.filter( (obj) => {
                    for (const s of snake) {
                        if (s.x === obj.x && s.y === obj.y) { return false }
                    }
                    return true
                })

                const startingFood = []
                for (let i = 0; i < 3; i++){
                    const randNum = Math.floor(Math.random() * boardSpaces.length)
                    startingFood[i] = boardSpaces[randNum] 
                    boardSpaces.splice(randNum, 1)
                }

                updateFood(startingFood)
                setEmptySpaces(boardSpaces)
            }

            const removeFood = (rX, rY, nX, nY) => {
                const temp = [...food]
                for (let i = 0; i < temp.length; i++){
                    if (temp[i].x === rX && temp[i].y === rY){
                        temp[i] = { x: nX, y: nY }
                    }
                }
                return temp
            }

            const calculateSnake = (oldSnake) => {
                const [head, ...body] = oldSnake 

                const newHead = (direction === 'ArrowRight') ? { x: head.x + 1, y: head.y }: 
                                (direction === 'ArrowLeft' ) ? { x: head.x - 1, y: head.y }:
                                (direction === 'ArrowDown' ) ? { x: head.x, y: head.y + 1 }:
                                                               { x: head.x, y: head.y - 1}

                if (newHead.x > 15 || newHead.x < 1 || newHead.y > 15 || newHead.y < 1) { setGameState('Dead') }
                let newSnake = []
                let ateFood = false
                
                for (const f of food) {
                    if (f.x === newHead.x && f.y === newHead.y) {
                        ateFood = true
                        newSnake = [newHead, ...oldSnake]
                        setHighScore(curr => curr+1)
                        const randSpot = emptySpaces[Math.floor(Math.random() * emptySpaces.length)]
                        updateFood(removeFood(f.x,f.y,randSpot.x,randSpot.y))
                    }
                }

                if (!ateFood) { newSnake = [newHead, ...oldSnake.slice(0,-1)] }

               setEmptySpaces(
                    (oldSpaces) => {
                        return oldSpaces.filter((obj) => {
                            for (const f of food) {
                                if (f.x === obj.x && f.y === obj.y) { return false }
                            }
                            for (const s of newSnake) {
                                if (s.x === obj.x && s.y === obj.y) { return false }
                            }
                            return true
                    })
                })


                return newSnake 
            }

            // effect sin nada ejecuta solo una vez on load
            React.useEffect( () => { generateBoard() }, [])
            
            React.useEffect(
                () => {
                    const handleDirection = (k) => {
                        if (k.key === 'ArrowRight' && direction != 'ArrowLeft'){
                            setDirection('ArrowRight')
                        } else if (k.key === 'ArrowLeft' && direction != 'ArrowRight'){
                            setDirection('ArrowLeft')
                        } else if (k.key === 'ArrowUp' && direction != 'ArrowDown'){
                            setDirection('ArrowUp')
                        } else if (k.key === 'ArrowDown' && direction != 'ArrowUp'){
                            setDirection('ArrowDown')
                        }
                    }

                    window.addEventListener("keydown", handleDirection)
                    return () => window.removeEventListener("keydown", handleDirection)
            }, [direction])

            React.useEffect(
                () => {
                    if (gameState === 'Alive') {
                        const i = setInterval(
                            () => {

                                const newSnake = calculateSnake(snake)
                                updateSnake(newSnake)
                                const [h, ...body] = newSnake
                                for (const s of body){ 
                                    if (h.x === s.x && h.y === s.y) { setGameState('Dead') }; 
                                }

                                if (highScore > prevHighScore) {
                                    setPrevHighScore(highScore)
                                }
                            }, speed)

                        return () => clearInterval(i)
                    }
                }, [direction, food, snake]) 

                return(
                <div className="parent">
                    <h1>React-ive Snake</h1>
                    <Score points={(highScore > prevHighScore) ? highScore : prevHighScore}/>
                    <p> Press the button below to begin your very own experience of the great Snake game made in React.<br/><br/>Use the arrow keys to move around! </p>
                    {
                        gameState === 'InitialLoad' ? (
                            <div id="mainArea">
                                <button onClick={() => {setGameState('Alive'); setDirection('ArrowRight')}} className="start">Start Game!</button>
                                <Board></Board>
                            </div>
                        ) : gameState === 'Pause' ? (
                            <div id="mainArea">
                                <button onClick={() => {setGameState('Alive'); setDirection(prevDirection)}} className="resume">Resume</button>
                                <PauseScreen />
                            </div>
                        ) : gameState === 'Dead' ? (
                            <div id="mainArea">
                                <button onClick={() => { generateBoard(); setGameState('Alive'); setDirection('ArrowRight') }} className="start">Start</button>
                                <DeathScreen />
                            </div>
                        ) : (
                            <div id="mainArea">
                                <button onClick={() => {setGameState('Pause'); setPrevDirection(direction); setDirection('nil')}} className="pause">Pause</button>
                                <Board>
                                    {food.map((obj, i) => { return(<Food key={i} x={obj.x} y={obj.y}/>) })}
                                    {snake.map((obj, i) => { return(<Point key={i} x={obj.x} y={obj.y}/>) })}
                                </Board>
                            </div>
                        )
                    }
                </div>
            )
        }

        root.render(<Game/>)

    </script>
</body>
</html>
